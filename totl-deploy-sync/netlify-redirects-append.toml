# --- PASTE INTO totl-deploy netlify.toml ABOVE the SPA /* -> index.html block ---

# Push diagnostics: exact path first (reliable); then splat for any other aliases.
[[redirects]]
  from = "/totl-functions/pushDebugReport"
  to = "/.netlify/functions/pushDebugReport"
  status = 200
  force = true

# So /.netlify/functions/* is not eaten by the SPA rule below; optional app paths under /totl-functions/
[[redirects]]
  from = "/totl-functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
